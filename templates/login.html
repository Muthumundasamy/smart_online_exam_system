<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Online Exam System</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
        }

        .login-card {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }

        .form-control {
            background-color: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
        }

        .form-control::placeholder {
            color: #eee;
        }

        .form-control:focus {
            box-shadow: none;
            border: 1px solid white;
        }

        .input-group-text {
            background-color: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
        }

        .btn-custom {
            background-color: white;
            color: #764ba2;
            font-weight: 600;
            border-radius: 10px;
        }

        .btn-custom:hover {
            background-color: #f1f1f1;
        }

        .navbar {
            background: transparent !important;
        }

        .navbar-brand {
            font-weight: bold;
            color: white !important;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#">Online Exam System</a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center align-items-center" style="height: 85vh;">
        <div class="col-md-5">

            <div class="card login-card shadow-lg p-4">

                <h3 class="text-center mb-4 fw-bold">Welcome Back 👋</h3>

                <!-- Flash Messages -->
                {% with messages = get_flashed_messages() %}
                  {% if messages %}
                    {% for msg in messages %}
                      <div class="alert alert-danger text-center">
                          {{ msg }}
                      </div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form action="{{ url_for('login') }}" method="POST">

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-envelope-fill"></i>
                            </span>
                            <input type="email" name="email" class="form-control"
                                   placeholder="Enter your email" required>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock-fill"></i>
                            </span>
                            <input type="password" name="password" id="password"
                                   class="form-control"
                                   placeholder="Enter your password" required>
                            <span class="input-group-text" onclick="togglePassword()" style="cursor:pointer;">
                                <i class="bi bi-eye-fill" id="eyeIcon"></i>
                            </span>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-custom btn-lg">
                            Login
                        </button>
                    </div>

                </form>

                <div class="text-center mt-4">
                    <small>
                        Don't have an account?
                        <a href="{{ url_for('register') }}" class="text-white fw-semibold text-decoration-none">
                            Register Here
                        </a>
                    </small>
                </div>

            </div>

        </div>
    </div>
</div>

<!-- JS -->
<script>
    function togglePassword() {
        const password = document.getElementById("password");
        const eyeIcon = document.getElementById("eyeIcon");

        if (password.type === "password") {
            password.type = "text";
            eyeIcon.classList.remove("bi-eye-fill");
            eyeIcon.classList.add("bi-eye-slash-fill");
        } else {
            password.type = "password";
            eyeIcon.classList.remove("bi-eye-slash-fill");
            eyeIcon.classList.add("bi-eye-fill");
        }
    }
</script>

</body>
</html>
