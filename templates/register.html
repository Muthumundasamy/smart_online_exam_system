<!DOCTYPE html>
<html>
<head>
    <title>Register - Online Examination</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        /* Left side gradient */
        .left-section {
            background: linear-gradient(to right, #4e73df, #1cc88a);
        }

        /* Card styling */
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* Button hover */
        .btn-primary {
            background-color: #4e73df;
            border: none;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background-color: #2e59d9;
            transform: translateY(-2px);
        }

        /* Animation */
        .card {
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
    </style>
</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<body>

<div class="container-fluid vh-100">
    <div class="row h-100">

        <!-- LEFT SIDE -->
        <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center left-section text-white">
            <div class="text-center">
                <i class="fa-solid fa-graduation-cap fa-4x mb-3"></i>
                <h2 class="fw-bold">Online Examination System</h2>
                <p>Secure • Fast • Reliable</p>
            </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="col-md-6 d-flex align-items-center justify-content-center bg-light">
            
            <div class="card shadow-lg p-4" style="width:450px;">
                <h4 class="text-center mb-4">Create Account</h4>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

                <form method="POST">
                    
                    <div class="mb-4">
                        <div class=" row mb-5">
                            <div class="col">
                                <input type="text" name="f_name" class="form-control w-100" placeholder="First Name" required>
                            </div>
                            <div class="col">
                                <input type="text" name="l_name" class="form-control w-100" placeholder="Last Name " required>
                            </div>
                        </div>
                    </div>    

                    <div class="mb-4">
                        <input type="email" name="email" class="form-control w-100" placeholder="Email Id" required>
                    </div>

                    <div class="mb-4">
                        <input type="tel" name="phno" class="form-control w-100" placeholder="MObile Number">
                    </div>

                    <div class="mb-4">
                        <input type="password" name="password" class="form-control w-100" placeholder="Password" required>
                    </div>

                    <div class="mb-4">
                        <input type="password" name="c_password" class="form-control w-100" placeholder="Confirm Password" required>
                    </div>


                    <button type="submit" class="btn btn-primary mt-4 w-100">
                        Register
                    </button>

                    <p class="text-center mt-3 mb-0">
                        Already have an account?
                        <a href="/login">Login</a>
                    </p>

                </form>
            </div>

        </div>

    </div>
</div>

</body>
</html>
