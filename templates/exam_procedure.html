<!DOCTYPE html>
<html>
<head>
    <title>Exam Instructions</title>
    <!-- Bootstrap CDN for professional look -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; font-family: Arial, sans-serif; }
        .card { margin-top: 50px; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; }
        ul li { margin-bottom: 10px; font-size: 16px; }
        .badge-duration { font-size: 16px; padding: 10px; }
        .start-btn { width: 200px; font-size: 18px; }

    .navbar-nav .nav-link {
        color: #ffffff !important;
        font-weight: 500;
        margin-left: 10px;
    }

    .navbar-nav .nav-link:hover {
        color: #ffd700 !important;   /* gold hover */
        transform: scale(1.05);
        transition: 0.3s;
    }

    .navbar-nav .nav-link.active {
        color: #ffd700 !important;
        font-weight: 700;
    }
</style>
</head>
<body>
    <h4 class="text-center mt-4 text-primary">Online Examination Portal</h4>
<hr>

<div class="container">
    <div class="card">
        <h2 class="mb-3 text-center">Exam Instructions</h2>

        <p>Please read the instructions carefully before starting the exam:</p>

        <ul>
            {% for rule in instructions %}
            <li>✔ {{ rule }}</li>
            {% endfor %}
        </ul>

        <div class="alert alert-warning mt-3">
            <strong>Important:</strong> Do not refresh or close the browser during the exam.
        </div>


        <p><strong>Exam Duration:</strong> 
            <span class="badge bg-primary badge-duration">{{ duration }} minutes</span>
        </p>

        <!-- Read instructions checkbox -->
        <div class="form-check mt-3">
            <input class="form-check-input" type="checkbox" id="readInstructions">
            <label class="form-check-label" for="readInstructions">
                I have read and understood the instructions.
            </label>
        </div>

        <!-- Start Exam button -->
        <div class="text-center mt-4">
            <a href="{{url_for('start_exam')}}" class="btn btn-success btn-lg start-btn disabled" id="startExamBtn">Start Exam</a>
        </div>
    </div>
</div>

<!-- Bootstrap JS and enabling button -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const checkbox = document.getElementById('readInstructions');
    const startBtn = document.getElementById('startExamBtn');

    checkbox.addEventListener('change', () => {
        if (checkbox.checked) {
            startBtn.classList.remove('disabled'); // enable button
        } else {
            startBtn.classList.add('disabled'); // disable button
        }
    });
</script>
</body>
</html>
