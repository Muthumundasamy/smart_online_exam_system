<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Question</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    .navbar-nav .nav-link {
        color: #ffffff !important;
        font-weight: 500;
        margin-left: 10px;
    }

    .navbar-nav .nav-link:hover {
        color: #ffd700 !important;   /* gold hover */
        transform: scale(1.05);
        transition: 0.3s;
    }

    .navbar-nav .nav-link.active {
        color: #ffd700 !important;
        font-weight: 700;
    }
</style>

<body class="bg-light">
       <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Admin Dashboard</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('admin_dashboard') }}">dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('view_users') }}">Users</a>
                    </li>
                    <li class="nav-item ">
                        <a class="nav-link" href="{{ url_for('manage_questions') }}">Questions</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('admin_results') }}">Results</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('logout') }}">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

<!-- Container -->
<div class="container mt-5">
    <div class="card shadow-lg border-0">
        <div class="card-header bg-primary text-white text-center">
            <h3 class="mb-0">Add Question</h3>
        </div>
        <div class="card-body p-4">

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for msg in messages %}
                  <div class="alert alert-success text-center">
                      {{ msg }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <!-- Form -->
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Question</label>
                    <textarea name="question" class="form-control" rows="3" placeholder="Enter your question here..." required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Option A</label>
                    <input type="text" name="option_a" class="form-control" placeholder="Enter Option A" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Option B</label>
                    <input type="text" name="option_b" class="form-control" placeholder="Enter Option B" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Option C</label>
                    <input type="text" name="option_c" class="form-control" placeholder="Enter Option C" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Option D</label>
                    <input type="text" name="option_d" class="form-control" placeholder="Enter Option D" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Correct Option (A/B/C/D)</label>
                    <select name="correct_option" class="form-select" required>
                        <option value="">Select Correct Option</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Marks</label>
                    <input type="number" name="mark" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-success w-100 fw-bold">
                    Add Question
                </button>
            </form>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
