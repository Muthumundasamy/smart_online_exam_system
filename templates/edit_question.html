<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Question</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    .navbar-nav .nav-link {
        color: #ffffff !important;
        font-weight: 500;
        margin-left: 10px;
    }

    .navbar-nav .nav-link:hover {
        color: #ffd700 !important;   /* gold hover */
        transform: scale(1.05);
        transition: 0.3s;
    }

    .navbar-nav .nav-link.active {
        color: #ffd700 !important;
        font-weight: 700;
    }
</style>

<body class="bg-light">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Admin Dashboard</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('admin_dashboard') }}">dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('view_users') }}">Users</a>
                    </li>
                    <li class="nav-item ">
                        <a class="nav-link" href="{{ url_for('manage_questions') }}">Questions</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('admin_results') }}">Results</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('logout') }}">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="text-center mb-4">Edit Question</h3>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for msg in messages %}
              <div class="alert alert-success text-center">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Question</label>
                <textarea name="question" class="form-control" required>{{ question.question }}</textarea>
            </div>

            <div class="mb-3">
                <label>Option A</label>
                <input type="text" name="option_a" class="form-control" value="{{ question.option_a }}" required>
            </div>

            <div class="mb-3">
                <label>Option B</label>
                <input type="text" name="option_b" class="form-control" value="{{ question.option_b }}" required>
            </div>

            <div class="mb-3">
                <label>Option C</label>
                <input type="text" name="option_c" class="form-control" value="{{ question.option_c }}" required>
            </div>

            <div class="mb-3">
                <label>Option D</label>
                <input type="text" name="option_d" class="form-control" value="{{ question.option_d }}" required>
            </div>

            <div class="mb-3">
                <label>Correct Option (A/B/C/D)</label>
                <select name="correct_option" class="form-control" required>
                    <option value="A" {% if question.correct_option=='A' %}selected{% endif %}>A</option>
                    <option value="B" {% if question.correct_option=='B' %}selected{% endif %}>B</option>
                    <option value="C" {% if question.correct_option=='C' %}selected{% endif %}>C</option>
                    <option value="D" {% if question.correct_option=='D' %}selected{% endif %}>D</option>
                </select>
            </div>

            <div class="mb-3">
                <label>mark</label>
                <input type="number" name="mark" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Update Question</button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
