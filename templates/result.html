<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exam Result</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #427ff0, #50eca3);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            width: 500px;
            color: #fff;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .score-box {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 15px;
        }
    </style>
</head>

<body>

<div class="glass-card text-center">

    <h2 class="fw-bold mb-4">Exam Result</h2>

    {% if status|upper == "PASS" %}
        <h4 class="text-success fw-bold">🎉 Congratulations! You Passed</h4>
    {% else %}
        <h4 class="text-danger fw-bold">❌ You Did Not Pass</h4>
    {% endif %}

    <div class="row mt-4 g-3">

        <div class="col-4">
            <div class="score-box">
                <small>Total</small>
                <h5>{{ total }}</h5>
            </div>
        </div>

        <div class="col-4">
            <div class="score-box">
                <small>Score</small>
                <h5>{{ score }}</h5>
            </div>
        </div>

        <div class="col-4">
            <div class="score-box">
                <small>Percent</small>
                <h5>{{ percentage | round(2) }}%</h5>
            </div>
        </div>

    </div>
    <a href="{{ url_for('review_answers', user_id=session['user_id']) }}"
   class="btn btn-warning w-100 mt-2 rounded-pill fw-bold">
   Review Answers
</a>


</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
